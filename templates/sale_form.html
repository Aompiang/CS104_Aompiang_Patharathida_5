{% extends 'base.html' %}
{% block content %}
<section class="page-header">
    <div>
        <h2>{{ 'Edit Sale' if sale else 'Add New Sale' }}</h2>
        <p>Record sales and revenue for construction supplies.</p>
    </div>
    <a class="button" href="{{ url_for('sale_list') }}">Back to Sales</a>
</section>
<form method="post" class="form-grid">
    <label>Item<select name="item_id" required>
        {% for item in items %}
            <option value="{{ item.item_id }}" {% if sale and sale.item_id == item.item_id %}selected{% endif %}>{{ item.name }}</option>
        {% endfor %}
    </select></label>
    <label>Sale Date<input type="date" name="sale_date" value="{{ sale.sale_date if sale else '' }}" required></label>
    <label>Quantity<input type="number" name="quantity" min="1" value="{{ sale.quantity if sale else '1' }}" required></label>
    <label>Sale Unit Price<input type="number" step="0.01" name="unit_price" value="{{ sale.unit_price if sale else '0.00' }}" required></label>
    <label>Cost Per Item<input type="number" step="0.01" name="cost_price" value="{{ sale.total_cost / sale.quantity if sale else '0.00' }}" required></label>
    <div class="form-actions">
        <button type="submit">{{ 'Save Sale' if sale else 'Create Sale' }}</button>
    </div>
</form>
{% endblock %}
