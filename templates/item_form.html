{% extends 'base.html' %}
{% block content %}
<section class="page-header">
    <div>
        <h2>{{ 'Edit Item' if item else 'Add New Item' }}</h2>
        <p>Set material category, supplier, prices and stock information.</p>
    </div>
    <a class="button" href="{{ url_for('item_list') }}">Back to Items</a>
</section>
<form method="post" class="form-grid">
    <label>Name<input name="name" value="{{ item.name if item else '' }}" required></label>
    <label>Category<select name="category_id" required>
        {% for category in categories %}
            <option value="{{ category.category_id }}" {% if item and item.category_id == category.category_id %}selected{% endif %}>{{ category.name }}</option>
        {% endfor %}
    </select></label>
    <label>Supplier<select name="supplier_id" required>
        {% for supplier in suppliers %}
            <option value="{{ supplier.supplier_id }}" {% if item and item.supplier_id == supplier.supplier_id %}selected{% endif %}>{{ supplier.name }}</option>
        {% endfor %}
    </select></label>
    <label>Unit Price<input name="unit_price" type="number" step="0.01" value="{{ item.unit_price if item else '' }}" required></label>
    <label>Cost Price<input name="cost_price" type="number" step="0.01" value="{{ item.cost_price if item else '' }}" required></label>
    <label>Stock Quantity<input name="stock_quantity" type="number" value="{{ item.stock_quantity if item else '0' }}" required></label>
    <label>Reorder Level<input name="reorder_level" type="number" value="{{ item.reorder_level if item else '0' }}" required></label>
    <div class="form-actions">
        <button type="submit">{{ 'Save Item' if item else 'Create Item' }}</button>
    </div>
</form>
{% endblock %}
